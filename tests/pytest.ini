[pytest]
pythonpath = ..
markers =
    unit: white-box / black-box tests of a single function or class in isolation (STP §3)
    integration: black-box shape-contract tests of GPT.forward / prefill / decode_one_token (STP §3)
    system: end-to-end GPT.generate tests (STP §3)
    nonfunctional: performance / latency benchmarks (STP §3)
